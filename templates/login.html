<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBMS | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='images/banklogo.png') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <section class="login-section">
        <div class="login-container">
            <h2 class="login-title">Login to SBMS</h2>

            
            <div class="toggle-switch">
                <label class="switch">
                    <input type="checkbox" id="loginType">
                    <span class="slider"></span>
                </label>
                <div class="toggle-labels">
                    <span class="active">Customer</span>
                    <span>Staff</span>
                </div>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <input type="text" name="userId" placeholder="User ID" required>
                    <i class="fas fa-user"></i>
                </div>
                <div class="form-group">
                    <input type="password" name="password" placeholder="Password" required>
                    <i class="fas fa-lock"></i>
                </div>
                <input type="hidden" name="loginType" id="loginTypeHidden" value="">
                <button type="submit" class="form-submit-btn">Login</button>
            </form>

            <div class="signup-link">
                Don't have an account? <a href="{{ url_for('signup') }}">Sign Up</a>
            </div>
        </div>
    </section>

    <script>
        const toggle = document.getElementById('loginType');
        const labels = document.querySelectorAll('.toggle-labels span');
        const hidden = document.getElementById('loginTypeHidden');

        toggle.addEventListener('change', () => {
            labels.forEach(l => l.classList.toggle('active'));
            hidden.value = toggle.checked ? 'on' : '';
        });

       
        hidden.value = toggle.checked ? 'on' : '';
    </script>
</body>
</html>
