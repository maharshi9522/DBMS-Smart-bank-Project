<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBMS | Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='images/banklogo.png') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <section class="signup-section">
        <div class="signup-container">
            <h2 class="signup-title">Sign Up for SBMS</h2>

            <div class="toggle-switch">
                <label class="switch">
                    <input type="checkbox" id="signupType">
                    <span class="slider"></span>
                </label>
                <div class="toggle-labels">
                    <span class="active">Customer</span>
                    <span>Staff</span>
                </div>
            </div>

            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            
            <form method="POST" action="{{ url_for('signup') }}">
                <div class="form-group">
                    <input type="text" name="userId" placeholder="User ID" required>
                    <i class="fas fa-user"></i>
                </div>

                <div class="form-group">
                    <input type="text" name="fullName" placeholder="Full Name" required>
                    <i class="fas fa-user-tie"></i>
                </div>

                <div class="form-group">
                    <input type="email" name="email" placeholder="Email" required>
                    <i class="fas fa-envelope"></i>
                </div>

                <div class="form-group">
                    <input type="password" name="password" placeholder="Password" required>
                    <i class="fas fa-lock"></i>
                </div>

               
                <div class="form-group" id="roleField" style="display: none;">
                    <select name="role">
                        <option value="Manager">Manager</option>
                        <option value="Officer">Officer</option>
                        <option value="Clerk">Clerk</option>
                        <option value="Admin">Admin</option>
                    </select>
                    <i class="fas fa-user-shield"></i>
                </div>

                <input type="hidden" name="signupType" id="signupTypeHidden" value="">

                <button type="submit" class="form-submit-btn" style="background: #003973;">Sign Up</button>
            </form>

            <div class="signup-link">
                Already have an account? <a href="{{ url_for('login') }}">Login</a>
            </div>
        </div>
    </section>

    <script>
        const toggle = document.getElementById('signupType');
        const labels = document.querySelectorAll('.toggle-labels span');
        const roleField = document.getElementById('roleField');
        const hidden = document.getElementById('signupTypeHidden');

        toggle.addEventListener('change', () => {
            labels.forEach(l => l.classList.toggle('active'));
            roleField.style.display = toggle.checked ? 'block' : 'none';
            hidden.value = toggle.checked ? 'on' : '';
        });

       
        hidden.value = toggle.checked ? 'on' : '';
        roleField.style.display = toggle.checked ? 'block' : 'none';
    </script>
</body>
</html>
